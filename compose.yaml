# Resume Parser 2.0 — local / production-like stack.
#
# Quick start:
#   1. Create .streamlit/secrets.toml (see README Configuration section).
#   2. docker compose up --build
#   3. Open http://localhost
#
# Streamlit only (no nginx):
#   docker compose up --build app

services:
  app:
    build: .
    container_name: resume-parser-app
    expose:
      - "8501"
    volumes:
      # Mount secrets at runtime — never copy into the image.
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: resume-parser-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
